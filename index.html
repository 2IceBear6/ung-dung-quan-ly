<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBox - Hệ Thống Quản Lý Trung Tâm Anh Ngữ</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. MÀN HÌNH ĐĂNG NHẬP -->
    <div id="loginScreen" class="screen-container">
        <div class="login-wrapper">
            <div class="login-left">
                <div class="brand">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <h2>EduBox</h2>
                </div>
                <h1 class="welcome-text">Chào mừng trở lại!</h1>
                <p class="subtitle">Đăng nhập để quản lý hệ thống trung tâm Anh ngữ</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email đăng nhập</label>
                        <div class="input-icon">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="admin@edubox.edu.vn" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-block" id="btnLogin">
                        <span class="btn-text">Đăng nhập</span>
                        <span class="loader hidden"></span>
                    </button>
                    <div id="loginError" class="error-msg hidden">Sai email hoặc mật khẩu!</div>
                </form>
            </div>
            <div class="login-right">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Students learning" class="login-image">
            </div>
        </div>
    </div>

    <!-- 2. MÀN HÌNH DASHBOARD -->
    <div id="dashboardScreen" class="screen-container hidden">
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>EduBox</h2>
            </div>
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="info">
                    <div class="name" id="userNameDisplay">Admin</div>
                    <div class="role" id="userRoleDisplay">Administrator</div>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Menu items will be injected here by JS based on Role -->
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="btnLogout" class="nav-item text-danger">
                    <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="topbar">
                <h2 id="pageTitle">Tổng quan</h2>
                <div class="topbar-actions">
                    <button class="btn-icon"><i class="fa-regular fa-bell"></i></button>
                </div>
            </header>
            
            <div class="content-area" id="contentArea">
                <!-- Nội dung các trang sẽ được render vào đây -->
            </div>
        </main>
    </div>

    <!-- GLOBAL LOADER -->
    <div id="globalLoader" class="global-loader hidden">
        <div class="spinner"></div>
    </div>

    <!-- MODAL CONTAINER -->
    <div id="modalContainer" class="modal-overlay hidden">
        <!-- Modal content will be injected by JS -->
    </div>

    <script src="script.js"></script>
</body>
</html>
